{% extends "base.html" %}

{% block content %}
<div class="container d-flex justify-content-center align-items-center vh-100">

    <div class="glass-card p-4 text-center">

        <h2 class="mb-4 text-white">🔐 Login</h2>

        <form method="POST">

            <!-- Username -->
            <div class="input-box mb-3">
                <i class="fas fa-user"></i>
                <input type="text" name="username" placeholder="Username" required>
            </div>

            <!-- Password -->
            <div class="input-box mb-3">
                <i class="fas fa-lock"></i>
                <input type="password" name="password" placeholder="Password" required>
            </div>

            <!-- Button -->
            <button class="btn login-btn w-100">Login 🚀</button>

        </form>

        <p class="mt-3">
            <a href="/register" class="link-hover">Create Account</a>
        </p>

    </div>

</div>

<!-- Font Awesome Icons -->
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<!-- 🎨 STYLES -->
<style>

/* 🌈 Animated Background */
body {
    background: linear-gradient(-45deg, #00c6ff, #0072ff, #1e3c72, #2a5298);
    background-size: 400% 400%;
    animation: gradientBG 10s ease infinite;
}

@keyframes gradientBG {
    0% {background-position: 0% 50%;}
    50% {background-position: 100% 50%;}
    100% {background-position: 0% 50%;}
}

/* 💎 Glass Card */
.glass-card {
    width: 350px;
    border-radius: 20px;
    backdrop-filter: blur(20px);
    background: rgba(255,255,255,0.1);
    box-shadow: 0 0 25px rgba(0,0,0,0.3);
}

/* 🧊 Input Box */
.input-box {
    position: relative;
}

.input-box i {
    position: absolute;
    top: 12px;
    left: 12px;
    color: white;
}

.input-box input {
    width: 100%;
    padding: 10px 10px 10px 35px;
    border-radius: 10px;
    border: none;
    outline: none;
}

/* 🔥 Button */
.login-btn {
    background: linear-gradient(45deg, #ff512f, #dd2476);
    border: none;
    color: white;
    font-weight: bold;
    border-radius: 10px;
    padding: 10px;
    transition: 0.3s;
}

/* Hover */
.login-btn:hover {
    transform: scale(1.05);
    box-shadow: 0 0 20px #ff512f;
}
<button onclick="history.back()" class="btn btn-secondary mb-3">⬅ Back</button>
/* Link */
.link-hover {
    color: white;
    text-decoration: none;
}

.link-hover:hover {
    color: #ffcc70;
    text-decoration: underline;
}

</style>

{% endblock %}
