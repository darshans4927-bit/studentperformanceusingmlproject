{% extends "base.html" %}
{% block content %}

<div class="glass">
<h3>📊 Analytics</h3>
<canvas id="chart"></canvas>
</div>

<script>
new Chart(document.getElementById("chart"), {
type:'bar',
data:{
labels: {{labels|tojson}},
datasets:[{
label:'Performance',
data: {{values|tojson}},
backgroundColor:['#28a745','#ffc107']
}]
},
options:{
animation:{
duration:2000
}
}
});
</script>

{% endblock %}
