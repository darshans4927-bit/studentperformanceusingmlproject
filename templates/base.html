<!DOCTYPE html>
<html>
<head>
<title>Student AI System</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body {
    background: linear-gradient(45deg,#1e3c72,#2a5298);
    color:white;
    animation: fadeIn 1s ease-in;
}

@keyframes fadeIn {
    from {opacity:0;}
    to {opacity:1;}
}

.glass {
    background: rgba(255,255,255,0.1);
    padding:20px;
    border-radius:15px;
    transition:0.3s;
}

.glass:hover {
    transform: scale(1.02);
}

.navbar a {
    transition:0.3s;
}

.navbar a:hover {
    transform: scale(1.1);
}
</style>

</head>

<body>

<nav class="navbar navbar-dark bg-dark px-3">
<a href="/dashboard" class="navbar-brand">🎓 AI System</a>

<div>
<a href="/dashboard" class="btn btn-light btn-sm">Dashboard</a>
<a href="/predict" class="btn btn-light btn-sm">Predict</a>
<a href="/charts" class="btn btn-light btn-sm">Charts</a>
<a href="/upload" class="btn btn-light btn-sm">Upload</a>
<a href="/chatbot" class="btn btn-light btn-sm">Chatbot</a>

{% if session.get("role")=="admin" %}
<a href="/admin" class="btn btn-warning btn-sm">Admin</a>
{% endif %}

<a href="/logout" class="btn btn-danger btn-sm">Logout</a>
</div>
</nav>

<div class="container mt-4">
{% block content %}{% endblock %}
</div>

</body>
</html>
