{% extends "base.html" %}

{% block content %}

<div class="card-custom text-center">
<h5>📊 Predict</h5>
<a href="/predict" class="btn btn-primary w-100">Open</a>
</div>
</div>

<div class="col-md-3" data-aos="zoom-in">

</div>
